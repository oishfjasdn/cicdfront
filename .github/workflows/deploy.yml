name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@main
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.branch) || github.ref_name }}

      # 2. 安装指定版本 nodejs
      - uses: actions/setup-node@main
        with:
          node-version: 22

      # 3. 安装指定版本 pnpm
      - uses: pnpm/action-setup@master
        with:
          version: 10

      # 4. 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 打包项目
      - name: Build project
        run: pnpm run build

      # 6. 部署到远程服务器（目录参照步骤 2 ）
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        with:
          REMOTE_HOST: "1p.wztj.net"
          REMOTE_USER: cicd       # 用 cicd 用户
          REMOTE_PORT: "22"
          SOURCE: "dist/*"
          TARGET: "/opt/1panel/www/sites/cicd.wztj.net/index"
          ARGS: "-avzr --delete"
          SCRIPT_AFTER: chmod -R 750 ${{ env.TARGET }} # 可选指令，指定比较安全的权限